<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css"
</head>
<body>
    <aside class="navmenu">
        <img src="assets/logo/logo_blanco.png">
        <div class="avatar-container">
            <img src="assets/avatar/default.png" id="navAvatar" alt="Perfil">
        </div>
        <span id="username-field">nombre</span>


        <section class="asignaturas-container">
            <h1>Mis asignaturas</h1>
            <ul id="listaAsignaturas">
            </ul>
            <button id="addAsignatura">Añadir asignatura +</button>
        </section>


        <section class="opciones-container">
            <a href="dashboard.html">
                <div class="navmenu-opciones"><img src="assets/icons/home.png"><span>Inicio</span></div>
            </a>
            <a>
                <div class="navmenu-opciones"><img src="assets/icons/perfil.png"><span>Mi perfil</span></div>
            </a>
            <a href="index.html">
                <div class="navmenu-opciones"><img src="assets/icons/exit.png"><span>Cerrar sesión</span></div>
            </a>
        </section>
    </aside>
    <main>
        <header>
            <div>
                <span id="nombre">Pepito</span><span> - Panel de control</span>
            </div>
            <div>
                <span id="fecha"></span>
            </div>
        </header>
    
        <div id="panel">
            <div class="fila1 caja">PRÓXIMO PROYECTO</div>
            <div class="fila1 caja">ESTADÍSTICAS DE LA SEMANA</div>
            <div class="resto caja">LISTA DE PROYECTOS</div>
            <div class="resto caja">
                <div class="cabecera">
                    <h2>LISTA DE TAREAS</h2>
                    <button class="btn-add" id="btn-crearTarea">Añadir</button>
                </div>
                <ul id="listaTareas">
                    <li class="tarea">

                    </li>
                </ul>
            </div>
            <div class="resto caja">LISTA DE EXÁMENES</div>
            <div class="resto caja">TEMPORIZADOR</div>

            <div class="resto" id="RachaFrase">
                <div class="caja" id="racha">RACHA</div>
                <div class="caja" id="frase">
                    <div class="cabeceraPeq">
                        <h2>La frase del día es...</h2>
                    </div>
                    <span id="fraseDelDia"></span>
                </div>
            </div>

            <div class="resto caja">
                <div class="cabecera">
                    <h2>Mis notas</h2>
                    <button class="btn-add" id="btn-crearNota">Añadir</button>
                </div>
                <ul id="listaNotas">
                    <li class="nota"></li>
                </ul>
            </div>
        </div>
        

    </main>

    <div id="modalTarea" class="modal-oculto">
        <div class="contenido-modal">
            <h3>Nueva tarea</h3>
            <input type="text" id="inputNombreTarea" placeholder="Nombre de la tarea">
            <input type="date" id="inputFechaTarea">

            <div class="botones-modal-tarea">
                <button id="btn-addTarea">Añadir</button>
                <button id="btn-cancelarTarea">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modalNota" class="modal-oculto">
        <div class="contenido-modal">
            <h3>Nueva nota</h3>
            <input type="text" id="inputNota" placeholder="Contenido de la nota">

            <div class="botones-modal-tarea">
                <button id="btn-addNota">Añadir</button>
                <button id="btn-cancelarNota">Cancelar</button>
            </div>
        </div>
    </div>
    
    <script src="js/dashboard.js"></script>
</body>
</html>
