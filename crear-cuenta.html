<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/crear-cuenta.css">
</head>
<body>
    <img src="assets/logo/logo.png" alt="Logo de StudyGrid">
    <form>
        <h3>Tu avatar</h3>
        <div class="selector-avatar">
            <div class="avatar-actual" id="currentAvatarContainer">
                <img src="assets/avatar/pesa.png" id="avatar-seleccionado" alt="Avatar actual">
                <div class="overlay">Cambiar</div>
            </div>
            <div class="avatar-opciones" id="avatarMenu">
                <img src="assets/avatar/pesa.png" class="option" data-avatar="pesa">
                <img src="assets/avatar/pincel.png" class="option" data-avatar="pincel">
            </div>
        </div>
        <h3>Nombre de usuario</h3>  
        <input type="text" id="username" placeholder="Nombre de usuario" required>
        <h3>Correo electrónico</h3>  
        <input type="email" id="mail" placeholder="Correo electrónico" required>
        <h3>Contraseña</h3>
        <input type="password" id="password" placeholder="Contraseña" required>
        <button type="submit" id="btn-crearcuenta">Crear cuenta</button>
    </form>
    <span>¿Ya tienes una cuenta? <a href="index.html">Iniciar sesión</a></span>
    <footer>
        <h2>Desarrollo: <a href="https://github.com/gasparmartinez-dev">gasparmartinez-dev</a></h2>
        <h2>Contacto: gasparmartinez.dev@gmail.com</h2>
    </footer>
    <script src="js/crear-cuenta.js"></script>
</body>
</html>
